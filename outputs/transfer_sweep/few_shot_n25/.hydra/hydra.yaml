hydra:
  run:
    dir: outputs/transfer_sweep/few_shot_n25
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(purple)sHYDRA%(reset)s] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(blue)s%(name)s%(reset)s][%(log_color)s%(levelname)s%(reset)s]
          - %(message)s'
        log_colors:
          DEBUG: purple
          INFO: green
          WARNING: yellow
          ERROR: red
          CRITICAL: red
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.run.dir=outputs/transfer_sweep/few_shot_n25
    - hydra.mode=RUN
    task:
    - +backbone=dynamic_causal_pfn
    - +backbone/dynamic_causal_pfn_hparams=cancer_sim_pretrain_tuned
    - +dataset=cancer_sim
    - dataset.coeff=10.0
    - exp.seed=101
    - exp.gpus=[0]
    - exp.logging=False
    - exp.max_epochs=25
    - model.dynamic_causal_pfn.pretrained_ckpt=/data1/letternight/test_simple-1/outputs/2026-03-08/16-59-46/checkpoints/last.ckpt
    - model.dynamic_causal_pfn.transfer_mode=few_shot
    - model.dynamic_causal_pfn.few_shot_samples=25
  job:
    name: train_dynamic_causal_pfn
    chdir: null
    override_dirname: +backbone/dynamic_causal_pfn_hparams=cancer_sim_pretrain_tuned,+backbone=dynamic_causal_pfn,+dataset=cancer_sim,dataset.coeff=10.0,exp.gpus=[0],exp.logging=False,exp.max_epochs=25,exp.seed=101,model.dynamic_causal_pfn.few_shot_samples=25,model.dynamic_causal_pfn.pretrained_ckpt=/data1/letternight/test_simple-1/outputs/2026-03-08/16-59-46/checkpoints/last.ckpt,model.dynamic_causal_pfn.transfer_mode=few_shot
    id: ???
    num: ???
    config_name: config.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.1'
    cwd: /data1/letternight/test_simple-1
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /data1/letternight/test_simple-1/config
      schema: file
      provider: main
    - path: hydra_plugins.hydra_colorlog.conf
      schema: pkg
      provider: hydra-colorlog
    - path: ''
      schema: structured
      provider: schema
    output_dir: /data1/letternight/test_simple-1/outputs/transfer_sweep/few_shot_n25
    choices:
      dataset: cancer_sim
      backbone/dynamic_causal_pfn_hparams: cancer_sim_pretrain_tuned
      backbone: dynamic_causal_pfn
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: colorlog
      hydra/hydra_logging: colorlog
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false

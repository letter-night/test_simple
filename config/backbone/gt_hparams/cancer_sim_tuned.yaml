# @package _global_
dataset:
  coeff: 10.0

model:
  gt:
    optimizer:
      learning_rate: 0.01
    batch_size: 64
    num_layer: 1
    seq_hidden_units: 4
    hr_size: 6
    fc_hidden_units: 18
    dropout_rate: 0.1
    num_heads: 1

  self_positional_encoding:
    max_relative_position: 15


exp:
  max_epochs: 50

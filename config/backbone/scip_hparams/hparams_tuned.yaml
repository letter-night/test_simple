# @package _global_
dataset:
  coeff: 10.0
  treatment_mode: multilabel
  fill_missing: False

model:
  propensity_treatment:
    seq_hidden_units: 1
    dropout_rate: 0.1
    num_layer: 1
    batch_size: 128
    max_grad_norm: 1.0
    optimizer:
      learning_rate: 0.0001

  propensity_history:
    seq_hidden_units: 2
    dropout_rate: 0.1
    num_layer: 1
    batch_size: 256
    max_grad_norm: 2.0
    optimizer:
      learning_rate: 0.0001

  encoder:
    seq_hidden_units: 20
    dropout_rate: 0.1
    num_layer: 1
    batch_size: 64
    max_grad_norm: 2.0
    optimizer:
      learning_rate: 0.01

  train_decoder: True
  decoder:
    seq_hidden_units: 80
    dropout_rate: 0.2
    num_layer: 2
    batch_size: 1024
    max_grad_norm: 0.5
    optimizer:
      learning_rate: 0.0001

exp:
  max_epochs: 50
